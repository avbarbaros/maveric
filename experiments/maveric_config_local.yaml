# MAVERIC Configuration for Google Colab T4 GPU Environment
# Optimized for ELEVATER datasets experiments

# Base local drive configuration
maveric_base_dir: "/content/drive/MyDrive/MAVERIC"
cache_base_dir: "/content/local/cache"
results_dir: "/content/local/exp/maveric_experiments"

# Model settings optimized for T4 GPU (16GB VRAM)
clip_model: "ViT-B/32"  # Fastest and most memory efficient
batch_size: 32          # Optimal for T4 memory
device: "cuda"
max_memory_gb: 14       # Leave 2GB for system

# Retrieval settings
retrieval_rotation_size: 1000   # Samples per file when saving intermediate results
n_reference_images: 10         # Number of reference images for similarity matching
max_retries: 0                 # Maximum download retry attempts
request_timeout: 1             # Request timeout in seconds
enable_target_class_quality: false  # Disable EfficientNet

# Quality metrics to compute - organized by category
quality_metrics:
  # Visual metrics (image-only)
  - "resolution"
  - "sharpness" 
  - "color_diversity"
  # Semantic metrics (text-only)
  - "text_quality"
  - "caption_length"
  # Multimodal metrics (cross-modal)
  - "target_class_quality"
  - "multimodal_consistency"

# Scoring mode: "clip" (default, CLIP-based multi-modal) or "hu_moments" (shape-based)
scoring_mode: "clip"

# Metric weights for composite scoring (only used in CLIP mode)
metric_weights:
  img2img: 0.25    # Image-to-image similarity weight
  txt2txt: 0.25    # Text-to-text similarity weight
  img2txt: 0.25    # Image-to-text consistency weight
  txt2img: 0.25    # Text-to-image consistency weight

# Per-dataset evaluation metrics (following ELEVATER Table 5)
# Available metrics:
#   - accuracy: Standard top-1 accuracy (default for most datasets)
#   - mean_per_class: Balanced accuracy / mean-per-class accuracy
#   - roc_auc: ROC AUC score (requires binary classification)
#   - voc11_map: VOC 11-point interpolated mean Average Precision (multi-label)
evaluation_metrics:
  # Datasets using mean-per-class (balanced accuracy)
  caltech101: "mean_per_class"
  oxford_pets: "mean_per_class"
  fgvc_aircraft: "mean_per_class"
  flowers102: "mean_per_class"

  # Binary classification with ROC AUC
  hateful_memes: "roc_auc"

  # Multi-label classification with 11-point mAP
  voc2007: "voc11_map"

  # All other datasets use standard accuracy (implicit default)
  # cifar10, cifar100, mnist, fashion_mnist, svhn, stl10, dtd, eurosat,
  # fer2013, food101, gtsrb, kitti_distance, country211, patchcamelyon,
  # renderedsst2, resisc45, stanfordcars

# Quality thresholds for ELEVATER experiments - organized by category
# These can be adjusted based on your requirements
quality_thresholds:
  # Visual quality metrics
  sharpness_score: 0    # (Mean - Standart_Deviation)
  resolution_score: 0   # (Mean - Standart_Deviation)
  color_score: 0        # (Mean - Standart_Deviation)
  
  # Multimodal metrics
  weighted_class_score: 0     # (Mean + Standart_Deviation/2)
  consistency: 0              # (Mean + Standart_Deviation/2)

# Caching settings for efficiency
caching:
  enable_image_cache: true
  enable_sample_cache: true
  enable_embedding_cache: true
  enable_results_cache: true
  cache_compression: true
  max_cache_size_gb: 5      # Limit cache size on Google Drive
  cache_format: "jpg"       # Image cache format
  cache_quality: 95         # JPEG quality for cached images

# Dataset processing settings
processing:
  max_samples_per_dataset: 1000000  # Limit for memory management
  shuffle_data: true
  seed: 42                         # For reproducible results
  
# Training configuration (for model customization)
training:
  epochs: 30
  learning_rate: 0.0000001
  weight_decay: 0.05
  warmup_steps: 200

  # Regularization settings
  use_regularization: true  # Prevent catastrophic forgetting with MSE loss to original weights
  regularization_weight: 0.9  # Weight for regularization loss (0.0-1.0)

  # Data augmentation settings
  use_augmentation: true
  augmentation_strength: 2  # RandAugment num_ops
  augmentation_magnitude: 8  # RandAugment magnitude

  # Domain adaptation settings (simulate test data characteristics)
  # Applied AFTER RandAugment to ensure domain match

  # Global defaults (used as fallback when dataset not specified below)
  use_domain_adaptation: true  # Default: disabled (override per-dataset)

  # Gaussian Blur (simulates low quality/pixelation)
  domain_blur_probability: 0.5
  domain_blur_sigma_range: [0.5, 2.0]

  # JPEG Compression (adds compression artifacts)
  domain_jpeg_probability: 0.4
  domain_jpeg_quality_range: [50, 90]

  # Downsample/Upsample (simulates resolution degradation)
  domain_downsample_probability: 0.7

  # Target size mode: Use fixed size for CIFAR-10/MNIST, or null for scale range
  domain_target_size: 32  # Default: use scale_range (override per-dataset)

  # Scale range fallback (used when domain_target_size is null)
  domain_downsample_scale_range: [0.5, 0.9]

  # Per-dataset domain adaptation overrides
  # Only specify use_domain_adaptation and domain_target_size per dataset
  # Other parameters (blur, JPEG, downsample probabilities) are global
  dataset_domain_adaptation:
    cifar10:
      use_domain_adaptation: true
      domain_target_size: 32
    cifar100:
      use_domain_adaptation: true
      domain_target_size: 32
    mnist:
      use_domain_adaptation: true
      domain_target_size: 28
    gtsrb:
      use_domain_adaptation: true
      domain_target_size: 32
    eurosat:
      use_domain_adaptation: true
      domain_target_size: 64
    resisc45:
      use_domain_adaptation: true
      domain_target_size: 256
    fer2013:
      use_domain_adaptation: true
      domain_target_size: 48 
    pcam:
      use_domain_adaptation: true
      domain_target_size: 96 
    caltech101:
      use_domain_adaptation: true
      domain_target_size: 300
    country211:
      use_domain_adaptation: true
      domain_target_size: 500
    voc2007:
      use_domain_adaptation: true
      domain_target_size: 500
    hatefulmemes:
      use_domain_adaptation: true
      domain_target_size: 500
    renderedsst2:
      use_domain_adaptation: true
      domain_target_size: 448
    kittidistance:
      use_domain_adaptation: false
      domain_target_size: null
    food101:
      use_domain_adaptation: false
      domain_target_size: null 
    dtd:
      use_domain_adaptation: false
      domain_target_size: null
    flowers102:
      use_domain_adaptation: false
      domain_target_size: null
    oxfordpets:
      use_domain_adaptation: false
      domain_target_size: null
    stanfordcars:
      use_domain_adaptation: false
      domain_target_size: null
    fgvcaircraft:
      use_domain_adaptation: false
      domain_target_size: null

  # Optimization settings
  optimizer: "adamw"  # adamw, adam, sgd
  scheduler: "cosine"  # cosine, linear, constant
  gradient_clip_value: 0.5

  # Validation settings
  use_validation: true  # Set to false to disable validation and use all data for training
  validation_method: "stratified_kfold"  # "stratified_kfold" or "simple_split"
  validation_k_folds: 5  # Number of folds for stratified k-fold validation
  validation_split: 0.2  # Fraction for simple split validation (used if method is "simple_split")
  checkpoint_selection_metric: "val_acc"
  evaluate_test_each_epoch: false

  # Model checkpointing
  save_best_model: true
  eval_frequency: 1
  save_frequency: 1
  keep_last_n_checkpoints: 3
  skip_epoch_evaluation: false  # Set to true for unified training to skip per-epoch evaluation

  # Advanced settings
  mixed_precision: false
  gradient_accumulation_steps: 1

  # Text source for training: "labels" or "captions"
  #text_source: "captions"
  text_source: "labels"
  
# Logging and monitoring
logging:
  level: "INFO"
  log_to_file: true
  log_file_path: "/content/drive/MyDrive/MAVERIC/maveric_experiments/maveric.log"
  save_logs: true  # Legacy setting, use log_to_file instead

# Progress display settings
enable_real_time_stats: true   # Show real-time download/cache statistics during retrieval
disable_progress_bars: true    # Disable verbose tqdm progress bars for cleaner output
  
# Experiment settings
experiment:
  save_intermediate_results: true
  checkpoint_frequency: 1000      # Save every N samples
  generate_visualizations: true
  save_sample_images: true
  max_visualization_samples: 100

# ELEVATER dataset specific settings
elevater:
  # List of ELEVATER datasets to process
  datasets:
    - "Cars"
    - "CIFAR10" 
    - "CIFAR100"
    - "DTD"
    - "EuroSAT"
    - "FER2013"
    - "FGVCAircraft"
    - "Flowers102"
    - "Food101"
    - "GTSRB"
    - "HatefulMemes"
    - "MNIST"
    - "OxfordIIITPet"
    - "PCAM"
    - "RESISC45"
    - "RenderedSST2"
    - "StanfordCars"
    - "STL10"
    - "SUN397"
    - "SVHN"
    
  # Retrieval settings for each dataset
  retrieval:
    num_samples: 10000000     # Number of samples to retrieve per dataset
    similarity_threshold: 0.7  # Minimum similarity for retrieval
    diversification: true      # Enable diversity in retrieval
    
  # Quality control settings
  quality_control:
    enable_filtering: true
    balance_classes: true     # Balance classes after filtering
    balance_strategy: "median"  # Balancing strategy: median, mean, min, max, none
    min_samples_per_class: 50 # Minimum samples to keep per class
    enable_oversampling: true # Enable oversampling for small classes

# Performance optimization
performance:
  num_workers: 4            # DataLoader workers
  prefetch_factor: 2        # Data prefetching
  pin_memory: true          # Pin memory for GPU transfer
  
# Output settings
output:
  save_filtered_datasets: true
  save_quality_reports: true
  save_visualizations: true
  export_format: "json"     # json, csv, parquet

# Visualization settings
visualization:
  style: "default"          # Matplotlib style
  dpi: 100                  # Figure DPI
  save_figures: false       # Save plots to files

# Grid visualization setting for interactive GUI
# When enabled, saves 10x10 image grids to curationResults/ when clicking "Save Data"
save_grid_visualization: false