# Output settings
output:
  save_filtered_datasets: true
  save_quality_reports: true
  save_visualizations: true
  export_format: "json"     # json, csv, parquet

# Visualization settings
visualization:
  style: "default"          # Matplotlib style
  dpi: 100                  # Figure DPI
  save_figures: false       # Save plots to files
  
# Model customization settings (if enabled)
customization:
  enable_fine_tuning: false  # Set to true if you want to fine-tune models
  epochs: 5
  learning_rate: 0.0001
  weight_decay: 0.01
  save_checkpoints: true